<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Tanmay Singh | Website Temporarily Offline</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070d;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --border: rgba(255, 255, 255, 0.14);
      --surface: rgba(255, 255, 255, 0.065);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      color: var(--text);
      background:
        radial-gradient(circle at 80% 10%, rgba(167, 139, 250, 0.22), transparent 30rem),
        radial-gradient(circle at 10% 20%, rgba(125, 211, 252, 0.18), transparent 28rem),
        linear-gradient(135deg, #05070d 0%, #080b12 48%, #0b1020 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(100%, 720px);
      padding: clamp(28px, 7vw, 56px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(24px);
    }

    p.status {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 58ch;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.18rem);
    }

    a {
      color: var(--accent);
      text-decoration-color: rgba(125, 211, 252, 0.45);
      text-underline-offset: 4px;
    }

    a:hover {
      color: var(--accent-2);
    }
  </style>
</head>

<body>
  <main>
    <p class="status">Temporarily offline</p>
    <h1>Website under development</h1>
    <p>
      Tanmay Singh's academic website is temporarily offline while a new version is being prepared.
      Please check back soon.
    </p>
    <p>
      For urgent contact, email <a href="mailto:tsingh65@asu.edu">tsingh65@asu.edu</a>.
    </p>
  </main>
</body>

</html>
